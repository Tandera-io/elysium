<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Stage 2: Growing — taller plant with multiple leaves -->
  <rect width="64" height="64" fill="#5a4a2a"/>
  <!-- Soil lines -->
  <line x1="8" y1="48" x2="56" y2="48" stroke="#4a3a1a" stroke-width="2"/>
  <!-- Stem -->
  <rect x="30" y="8" width="4" height="40" fill="#5e9b2e"/>
  <!-- Lower leaf pair -->
  <ellipse cx="20" cy="36" rx="11" ry="6" fill="#5e9b2e" transform="rotate(-25 20 36)"/>
  <ellipse cx="44" cy="36" rx="11" ry="6" fill="#5e9b2e" transform="rotate(25 44 36)"/>
  <!-- Upper leaf pair -->
  <ellipse cx="22" cy="22" rx="9" ry="5" fill="#7caf3e" transform="rotate(-15 22 22)"/>
  <ellipse cx="42" cy="22" rx="9" ry="5" fill="#7caf3e" transform="rotate(15 42 22)"/>
  <!-- Bud at top -->
  <ellipse cx="32" cy="10" rx="5" ry="4" fill="#8db454"/>
</svg>
