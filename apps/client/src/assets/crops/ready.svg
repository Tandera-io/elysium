<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Stage 3: Ready to harvest — full plant with golden glow -->
  <rect width="64" height="64" fill="#5a4a2a"/>
  <!-- Harvest glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#e8c34a" stroke-width="3" opacity="0.7"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#f5d86a" stroke-width="1" opacity="0.4"/>
  <!-- Soil lines -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="#4a3a1a" stroke-width="2"/>
  <!-- Stem -->
  <rect x="30" y="6" width="4" height="46" fill="#6a9b3c"/>
  <!-- Leaves -->
  <ellipse cx="18" cy="38" rx="12" ry="6" fill="#5e9b2e" transform="rotate(-25 18 38)"/>
  <ellipse cx="46" cy="38" rx="12" ry="6" fill="#5e9b2e" transform="rotate(25 46 38)"/>
  <ellipse cx="20" cy="24" rx="10" ry="5" fill="#7caf3e" transform="rotate(-15 20 24)"/>
  <ellipse cx="44" cy="24" rx="10" ry="5" fill="#7caf3e" transform="rotate(15 44 24)"/>
  <!-- Ripe grain/fruit at top -->
  <ellipse cx="32" cy="8" rx="7" ry="6" fill="#e8c34a"/>
  <ellipse cx="32" cy="7" rx="4" ry="3" fill="#f5d86a" opacity="0.7"/>
</svg>
